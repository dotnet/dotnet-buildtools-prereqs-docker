parameters:
- name: disableMatrixTrimming
  type: boolean
  default: false
# sourceBuildPipelineRunId should be overridden when skipping a build to run
# tests or publish images that were produced in a different pipeline run.
- name: sourceBuildPipelineRunId
  type: string
  default: ""

variables:
- template: /eng/docker-tools/templates/variables/dotnet/build-test-publish.yml@self
  parameters:
    sourceBuildPipelineRunId: ${{ parameters.sourceBuildPipelineRunId }}
- name: officialBranches
  # comma-delimited list of branch names
  value: main
- name: manifest
  value: manifest.json
- name: dotnetVersion
  value: '*'
- name: osVariant
  value: ''
- name: publishReadme
  value: false
- name: imageBuilderBuildArgs
  # Default build args. PIP_INDEX_URL defaults to the public PyPI (anonymous and
  # unthrottled, unlike the Azure Artifacts mirror) and is overwritten with an
  # authenticated mirror URL by pip-authenticate.yml in internal pipelines.
  value: '--build-arg PIP_INDEX_URL=https://pypi.org/simple/ --build-arg HELIX_FEED=https://dnceng.pkgs.visualstudio.com/public/_packaging/helix-client-prod/pypi/simple'
- name: publicGitRepoUri
  value: https://github.com/dotnet/dotnet-buildtools-prereqs-docker
- name: publicSourceBranch
  value: main
- name: ingestKustoImageInfo
  value: false
- name: testScriptPath
  value: ""
- name: preBuildTestScriptPath
  value: ""
- ${{ if not(parameters.disableMatrixTrimming) }}:
  - name: trimCachedImagesForMatrix
    value: true
- name: gitHubNotificationsRepoInfo.repo
  value: dotnet-buildtools-prereqs-docker-internal
- name: imageBuilder.pathArgs
  value: "--path 'src/debian/12/helix/*'"